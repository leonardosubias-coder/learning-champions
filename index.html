<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Champions — Darwin AI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --accent: #3B5BFC;
  --bg: #f5f6fa;
  --text: #1a1a1a;
  --border: #E0E0E0;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-font-smoothing: antialiased;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
}

/* LOGIN */
#auth-screen {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #0d1b5e, #3B5BFC);
  display: flex;
  justify-content: center;
  align-items: center;
}

.auth-card {
  background: white;
  padding: 40px;
  border-radius: 16px;
  width: 100%;
  max-width: 380px;
  text-align: center;
}

/* LOGO FIX */
.auth-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  font-weight: 700;
  margin-bottom: 10px;
}

.darwin-i {
  position: relative;
}

.darwin-i::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 50%;
  transform: translateX(-50%);
  width: 5px;
  height: 5px;
  background: #3B5BFC;
  border-radius: 50%;
}

/* TEXT */
.auth-heading {
  font-size: 20px;
  margin-bottom: 8px;
}

.auth-sub {
  font-size: 14px;
  color: #666;
  margin-bottom: 20px;
}

/* GOOGLE BUTTON ONLY */
.btn-google {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
}

.btn-google:hover {
  background: #eef0ff;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth-screen">
  <div class="auth-card">

    <div class="auth-logo">
      Darw<span class="darwin-i">i</span>n AI
    </div>

    <h2 class="auth-heading">Accede con tu cuenta de Google</h2>
    <p class="auth-sub">Usa tu cuenta corporativa para entrar</p>

    <button class="btn-google">
      Acceder con Google
    </button>

  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <h1 style="padding:20px;">Training</h1>
</div>

</body>
</html>
